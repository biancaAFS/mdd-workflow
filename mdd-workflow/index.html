  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Work Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"04accc4c-5da6-473e-9094-ebf01aa9ae76\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Work Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"600efb04-c7ba-4dea-b925-94c36dff6380\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Work Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9deb8871-46f5-48a8-b13e-34e3bc30b01c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   MDD Sign-Off Workflow — styles\n   Palette & type drawn from the Agulhas reporting app\n   ============================================================ */\n:root {\n  --teal:       #0e6f81;\n  --teal-dark:  #0a5260;\n  --teal-700:   #0c606f;\n  --teal-soft:  #e4f0f2;\n  --teal-tint:  #f1f7f8;\n\n  --green:      #3f8f5f;\n  --green-soft: #e7f1ea;\n  --green-line: #bfd9c8;\n\n  --red:        #c0492f;\n  --red-soft:   #f7e8e3;\n\n  --amber:      #b8812c;\n  --amber-soft: #f6ecd9;\n\n  --blue:       #4789bd;\n  --blue-soft:  #e8f0f7;\n\n  --ink:        #2d3236;\n  --slate:      #565f64;\n  --muted:      #8b9298;\n  --faint:      #aab1b6;\n\n  --line:       #e3e7e9;\n  --line-soft:  #eef1f2;\n  --bg:         #f5f6f7;\n  --bg-2:       #eef0f1;\n  --card:       #ffffff;\n\n  --shadow-sm: 0 1px 2px rgba(31,41,46,.05), 0 1px 3px rgba(31,41,46,.04);\n  --shadow-md: 0 4px 14px rgba(31,41,46,.08), 0 1px 3px rgba(31,41,46,.05);\n  --shadow-lg: 0 18px 50px rgba(20,33,38,.20), 0 4px 14px rgba(20,33,38,.10);\n\n  --r-sm: 8px;\n  --r-md: 12px;\n  --r-lg: 18px;\n\n  --font: \"Plus Jakarta Sans\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  --mono: \"IBM Plex Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n}\n\n* { box-sizing: border-box; }\nhtml, body { height: 100%; }\nbody {\n  margin: 0;\n  font-family: var(--font);\n  color: var(--ink);\n  background:\n    radial-gradient(1200px 600px at 15% -10%, #ffffff 0%, rgba(255,255,255,0) 60%),\n    var(--bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---------- App shell ---------- */\n.app { display: flex; flex-direction: column; min-height: 100vh; }\n\nheader.topbar {\n  display: flex; align-items: center; gap: 18px;\n  padding: 16px 30px;\n  border-bottom: 1px solid var(--line);\n  background: rgba(255,255,255,.78);\n  backdrop-filter: saturate(140%) blur(8px);\n  position: sticky; top: 0; z-index: 40;\n}\n.brand { display: flex; align-items: center; gap: 12px; }\n.brand .mark {\n  width: 34px; height: 34px; border-radius: 9px;\n  background: linear-gradient(150deg, var(--teal), var(--teal-dark));\n  display: grid; place-items: center; color: #fff; flex: none;\n  box-shadow: 0 4px 12px rgba(14,111,129,.35);\n}\n.brand .mark svg { width: 19px; height: 19px; }\n.brand .word { font-weight: 800; letter-spacing: -.02em; font-size: 17px; color: var(--ink); }\n.brand .word span { color: var(--teal); }\n\n.title-block { display: flex; flex-direction: column; line-height: 1.15; }\n.title-block .kicker {\n  font-size: 11px; font-weight: 700; letter-spacing: .14em;\n  text-transform: uppercase; color: var(--teal); margin-bottom: 2px;\n}\n.title-block h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -.02em; }\n\n.topbar .spacer { flex: 1; }\n\n.toolbar { display: flex; align-items: center; gap: 10px; }\n.btn {\n  font-family: var(--font); font-size: 13px; font-weight: 600;\n  border: 1px solid var(--line); background: #fff; color: var(--slate);\n  padding: 9px 14px; border-radius: 999px; cursor: pointer;\n  display: inline-flex; align-items: center; gap: 8px;\n  transition: all .16s ease; white-space: nowrap;\n}\n.btn svg { width: 15px; height: 15px; }\n.btn:hover { border-color: var(--teal); color: var(--teal); box-shadow: var(--shadow-sm); }\n.btn.primary { background: var(--teal); border-color: var(--teal); color: #fff; }\n.btn.primary:hover { background: var(--teal-dark); border-color: var(--teal-dark); color: #fff; }\n.btn.playing { background: var(--red); border-color: var(--red); color: #fff; }\n.btn.playing:hover { background: #a83e28; border-color: #a83e28; color: #fff; }\n\n/* Toggle switch */\n.switch { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }\n.switch .track {\n  width: 40px; height: 22px; border-radius: 999px; background: var(--bg-2);\n  border: 1px solid var(--line); position: relative; transition: all .2s ease; flex: none;\n}\n.switch .track::after {\n  content: \"\"; position: absolute; top: 2px; left: 2px;\n  width: 16px; height: 16px; border-radius: 50%; background: #fff;\n  box-shadow: var(--shadow-sm); transition: all .2s ease;\n}\n.switch.on .track { background: var(--amber); border-color: var(--amber); }\n.switch.on .track::after { left: 20px; }\n.switch .label { font-size: 13px; font-weight: 600; color: var(--slate); }\n.switch.on .label { color: var(--amber); }\n\n/* ---------- Canvas ---------- */\n.canvas-wrap {\n  flex: 1; position: relative; overflow: auto;\n  padding: 28px 30px;\n  display: flex; align-items: center; justify-content: center;\n}\n.stage-scaler { transform-origin: top left; flex: none; }\n.stage {\n  position: relative;\n  width: 1500px; height: 660px;\n}\nsvg.wires {\n  position: absolute; inset: 0; width: 100%; height: 100%;\n  pointer-events: none; overflow: visible;\n}\nsvg.wires path { fill: none; transition: stroke .2s ease, opacity .2s ease, stroke-width .2s ease; }\nsvg.wires path.flow {\n  stroke-dasharray: 7 9; animation: dash 1.1s linear infinite;\n}\n@keyframes dash { to { stroke-dashoffset: -32; } }\n\n/* ---------- Nodes ---------- */\n.node {\n  position: absolute; cursor: pointer; user-select: none;\n  background: var(--card); border: 1px solid var(--line);\n  border-radius: var(--r-md); box-shadow: var(--shadow-sm);\n  padding: var(--node-pad-y, 13px) 15px; transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, opacity .3s ease;\n  display: flex; flex-direction: column; gap: 3px;\n}\n.node:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--teal); }\n.node.dim { opacity: .32; filter: saturate(.6); }\n.node.active { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-soft), var(--shadow-md); }\n.node.lit { border-color: var(--teal); box-shadow: 0 0 0 4px var(--teal-soft), var(--shadow-md); transform: translateY(-2px); }\n\n.node .top { display: flex; align-items: center; gap: 9px; }\n.node .ico {\n  width: 30px; height: 30px; border-radius: 8px; flex: none;\n  display: grid; place-items: center; color: var(--teal); background: var(--teal-soft);\n}\n.node .ico svg { width: 17px; height: 17px; }\n.node .name { font-size: 14px; font-weight: 700; letter-spacing: -.01em; color: var(--ink); line-height: 1.2; white-space: nowrap; }\n.node .sub { font-size: 11.5px; color: var(--muted); font-weight: 500; line-height: 1.3; padding-left: 39px; }\n.node .seq-badge {\n  position: absolute; top: -9px; left: -9px;\n  width: 22px; height: 22px; border-radius: 50%;\n  background: var(--teal); color: #fff; font-size: 11px; font-weight: 800;\n  display: grid; place-items: center; box-shadow: var(--shadow-sm);\n  font-family: var(--mono);\n}\n\n/* node variants */\n.node.start { background: linear-gradient(160deg, #ffffff, var(--teal-tint)); border-color: #cfe3e6; }\n.node.start .ico { background: var(--teal); color: #fff; }\n.node.start .name, .node.final .name { white-space: nowrap; }\n.node.final { background: linear-gradient(160deg, #ffffff, var(--teal-tint)); border-color: #cfe3e6; }\n.node.final .ico { background: var(--teal); color: #fff; }\n\n.node.cond .ico { background: var(--amber-soft); color: var(--amber); }\n.node.cond { border-style: dashed; border-color: #e4cf9f; }\n\n.node.outcome { padding: 11px 14px; }\n.node.outcome.live .ico { background: var(--green-soft); color: var(--green); }\n.node.outcome.del  .ico { background: var(--red-soft);  color: var(--red); }\n.node.outcome .name { font-size: 13px; }\n\n.node .tag {\n  align-self: flex-start; margin-top: 2px; margin-left: 39px;\n  font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;\n  padding: 2px 8px; border-radius: 999px;\n}\n.tag.parallel { background: var(--blue-soft); color: var(--blue); }\n.tag.seq { background: var(--teal-soft); color: var(--teal-700); }\n.tag.annual { background: var(--amber-soft); color: var(--amber); }\n\n/* group bracket label for the Returns chain */\n.group-label {\n  position: absolute; font-size: 11px; font-weight: 800; letter-spacing: .12em;\n  text-transform: uppercase; color: var(--teal-700); white-space: nowrap;\n  background: var(--teal-soft); padding: 4px 11px; border-radius: 999px;\n}\n.stage-label {\n  position: absolute; font-size: 11px; font-weight: 800; letter-spacing: .16em;\n  text-transform: uppercase; color: var(--faint); white-space: nowrap;\n}\n\n/* ---------- Legend bar ---------- */\n.legend {\n  display: flex; gap: 18px; align-items: center;\n  padding: 9px 30px; border-bottom: 1px solid var(--line);\n  background: rgba(255,255,255,.5);\n  font-size: 12px; color: var(--slate);\n}\n.legend .item { display: flex; align-items: center; gap: 7px; font-weight: 600; white-space: nowrap; }\n.legend .item.hint { margin-left: auto; color: var(--muted); font-weight: 500; }\n.legend .item.sla {\n  margin-left: auto; gap: 6px; color: var(--amber); font-weight: 700;\n  background: var(--amber-soft); border: 1px solid #ecd8aa; padding: 4px 11px; border-radius: 999px;\n}\n.legend .item.sla + .hint { margin-left: 16px; }\n.legend .item.sla svg { width: 14px; height: 14px; }\n.legend .dot { width: 11px; height: 11px; border-radius: 3px; }\n.legend .dot.par { background: var(--blue); }\n.legend .dot.seq { background: var(--teal); }\n.legend .dot.ann { background: var(--amber); }\n\n/* ---------- Detail drawer ---------- */\n.scrim {\n  position: fixed; inset: 0; background: rgba(20,33,38,.34); z-index: 50;\n  opacity: 0; pointer-events: none; transition: opacity .25s ease;\n}\n.scrim.show { opacity: 1; pointer-events: auto; }\n.drawer {\n  position: fixed; top: 0; right: 0; height: 100%; width: 480px; max-width: 92vw;\n  background: var(--card); z-index: 60; box-shadow: var(--shadow-lg);\n  transform: translateX(106%); transition: transform .32s cubic-bezier(.4,.0,.2,1);\n  display: flex; flex-direction: column;\n}\n.drawer.show { transform: translateX(0); }\n\n.drawer .d-head { padding: 26px 28px 20px; border-bottom: 1px solid var(--line); position: relative; }\n.drawer .d-eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }\n.d-eyebrow .d-ico {\n  width: 38px; height: 38px; border-radius: 10px; flex: none;\n  display: grid; place-items: center; color: var(--teal); background: var(--teal-soft);\n}\n.d-eyebrow .d-ico svg { width: 21px; height: 21px; }\n.d-eyebrow .step {\n  font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted);\n}\n.drawer h2 { margin: 0; font-size: 23px; font-weight: 800; letter-spacing: -.02em; line-height: 1.15; }\n.drawer .d-lede { margin: 10px 0 0; font-size: 14.5px; line-height: 1.55; color: var(--slate); }\n.d-close {\n  position: absolute; top: 22px; right: 22px; width: 32px; height: 32px; border-radius: 8px;\n  border: 1px solid var(--line); background: #fff; color: var(--muted); cursor: pointer;\n  display: grid; place-items: center; transition: all .15s ease;\n}\n.d-close:hover { color: var(--red); border-color: var(--red); }\n.d-close svg { width: 16px; height: 16px; }\n\n.drawer .d-body { padding: 22px 28px 40px; overflow-y: auto; flex: 1; }\n\n.d-section { margin-bottom: 22px; }\n.d-section h3 {\n  margin: 0 0 10px; font-size: 11px; font-weight: 800; letter-spacing: .12em;\n  text-transform: uppercase; color: var(--teal-700);\n}\n.io-list { display: flex; flex-direction: column; gap: 8px; }\n.io-row { display: flex; gap: 10px; align-items: flex-start; font-size: 13.5px; color: var(--slate); line-height: 1.5; }\n.io-row .b { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); margin-top: 7px; flex: none; }\n.io-row .b.out { background: var(--green); }\n\n.chips { display: flex; flex-wrap: wrap; gap: 8px; }\n.chip {\n  font-size: 12.5px; font-weight: 600; color: var(--slate);\n  border: 1px solid var(--line); background: var(--bg); border-radius: 999px; padding: 6px 12px;\n}\n.chip.tone-teal { background: var(--teal-soft); border-color: #cfe3e6; color: var(--teal-700); }\n\n.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }\n.meta {\n  border: 1px solid var(--line); border-radius: var(--r-sm); padding: 11px 13px; background: var(--bg);\n}\n.meta .k { font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }\n.meta .v { font-size: 14px; font-weight: 700; color: var(--ink); margin-top: 3px; }\n.meta .v.mono { font-family: var(--mono); font-weight: 600; font-size: 13px; }\n\n.callout {\n  display: flex; gap: 11px; align-items: flex-start;\n  background: var(--amber-soft); border: 1px solid #ecd8aa; border-radius: var(--r-sm);\n  padding: 12px 14px; font-size: 13px; line-height: 1.5; color: #7a5618;\n}\n.callout svg { width: 17px; height: 17px; flex: none; margin-top: 1px; color: var(--amber); }\n.callout.teal { background: var(--teal-tint); border-color: #cfe3e6; color: var(--teal-dark); }\n.callout.teal svg { color: var(--teal); }\n\n.shot { margin-top: 4px; }\n.shot figure { margin: 0; border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-sm); }\n.shot img { width: 100%; display: block; }\n.shot figcaption {\n  font-size: 11.5px; color: var(--muted); padding: 9px 13px; background: var(--bg);\n  border-top: 1px solid var(--line); font-weight: 500;\n}\n\n.outcome-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }\n.oc {\n  border-radius: var(--r-sm); padding: 13px; border: 1px solid var(--line);\n  display: flex; flex-direction: column; gap: 6px;\n}\n.oc.live { background: var(--green-soft); border-color: var(--green-line); }\n.oc.del  { background: var(--red-soft); border-color: #e6c4ba; }\n.oc .oc-h { display: flex; align-items: center; gap: 7px; font-weight: 800; font-size: 13px; }\n.oc.live .oc-h { color: var(--green); }\n.oc.del  .oc-h { color: var(--red); }\n.oc .oc-h svg { width: 15px; height: 15px; }\n.oc p { margin: 0; font-size: 12.5px; line-height: 1.45; color: var(--slate); }\n\n/* prev/next within drawer */\n.d-nav { display: flex; gap: 10px; margin-top: 8px; }\n.d-nav button {\n  flex: 1; font-family: var(--font); font-size: 12.5px; font-weight: 700; cursor: pointer;\n  border: 1px solid var(--line); background: #fff; color: var(--slate);\n  border-radius: var(--r-sm); padding: 10px; transition: all .15s ease;\n  display: flex; align-items: center; justify-content: center; gap: 7px;\n}\n.d-nav button:hover:not(:disabled) { border-color: var(--teal); color: var(--teal); }\n.d-nav button:disabled { opacity: .4; cursor: default; }\n.d-nav button svg { width: 14px; height: 14px; }\n\n.hint {\n  text-align: center; font-size: 12.5px; color: var(--muted); margin-top: -8px; padding-bottom: 8px;\n}\n\n/* ---------- Tweaks panel ---------- */\n.twkp {\n  position: fixed; right: 18px; bottom: 18px; z-index: 100; width: 268px;\n  background: rgba(255,255,255,.96); backdrop-filter: blur(10px) saturate(150%);\n  border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow-lg);\n  font-family: var(--font); display: none; flex-direction: column; overflow: hidden;\n}\n.twkp.show { display: flex; }\n.twkp .twk-h {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 13px 12px 13px 16px; border-bottom: 1px solid var(--line-soft);\n}\n.twkp .twk-h b { font-size: 13px; font-weight: 800; letter-spacing: -.01em; color: var(--ink); display: flex; align-items: center; gap: 8px; }\n.twkp .twk-h b svg { width: 15px; height: 15px; color: var(--teal); }\n.twkp .twk-x {\n  border: none; background: transparent; color: var(--muted); width: 26px; height: 26px;\n  border-radius: 7px; cursor: pointer; display: grid; place-items: center;\n}\n.twkp .twk-x:hover { background: var(--bg-2); color: var(--ink); }\n.twkp .twk-x svg { width: 15px; height: 15px; }\n.twkp .twk-b { padding: 15px 16px 17px; display: flex; flex-direction: column; gap: 15px; }\n.twk-sec { font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); }\n.twk-fr { display: flex; flex-direction: column; gap: 8px; }\n.twk-fr > label { font-size: 12px; font-weight: 600; color: var(--slate); }\n.twk-fr.row { flex-direction: row; align-items: center; justify-content: space-between; }\n\n.twk-sw { display: flex; gap: 9px; }\n.twk-sw button {\n  width: 26px; height: 26px; border-radius: 50%; cursor: pointer; padding: 0;\n  border: 2px solid transparent; box-shadow: 0 0 0 1px rgba(0,0,0,.08) inset;\n  transition: transform .12s ease;\n}\n.twk-sw button:hover { transform: scale(1.08); }\n.twk-sw button.on { border-color: #fff; box-shadow: 0 0 0 2px var(--ink); }\n\n.twk-seg { display: flex; background: var(--bg-2); border-radius: 9px; padding: 3px; gap: 2px; }\n.twk-seg button {\n  flex: 1; border: none; background: transparent; font-family: var(--font);\n  font-size: 11.5px; font-weight: 600; color: var(--slate); padding: 6px 4px;\n  border-radius: 6px; cursor: pointer; transition: all .14s ease; white-space: nowrap;\n}\n.twk-seg button.on { background: #fff; color: var(--ink); box-shadow: var(--shadow-sm); }\n\n.twk-sw-toggle {\n  width: 40px; height: 22px; border-radius: 999px; background: var(--bg-2);\n  border: 1px solid var(--line); position: relative; cursor: pointer; flex: none; transition: all .2s ease;\n}\n.twk-sw-toggle::after {\n  content: \"\"; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;\n  border-radius: 50%; background: #fff; box-shadow: var(--shadow-sm); transition: all .2s ease;\n}\n.twk-sw-toggle.on { background: var(--teal); border-color: var(--teal); }\n.twk-sw-toggle.on::after { left: 20px; }\n\n@media (max-width: 720px) {\n  header.topbar { flex-wrap: wrap; gap: 12px; padding: 14px 18px; }\n  .title-block { order: 3; width: 100%; }\n  .canvas-wrap { padding: 24px 14px 60px; }\n  .legend { display: none; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"app\">\n  <header class=\"topbar\">\n    <div class=\"brand\">\n      <div class=\"mark\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 18c3-7 5-7 8 0s5 7 8 0\"><\u002Fpath><path d=\"M4 12c3-6 5-6 8 0s5 6 8 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"word\">Agulhas<span>.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"title-block\">\n      <span class=\"kicker\">Process Guide<\u002Fspan>\n      <h1>Minimum Disclosure Document — Sign-Off Workflow<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"spacer\"><\u002Fdiv>\n    <div class=\"toolbar\">\n      <div class=\"switch\" id=\"augSwitch\" role=\"switch\" aria-checked=\"false\" tabindex=\"0\">\n        <span class=\"track\"><\u002Fspan>\n        <span class=\"label\">August MDD<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"btn\" id=\"resetBtn\" title=\"Reset view\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12a8 8 0 1 1 2.3 5.6\"><\u002Fpath><path d=\"M4 19v-4h4\"><\u002Fpath><\u002Fsvg>\n        Reset\n      <\u002Fbutton>\n      <button class=\"btn primary\" id=\"playBtn\">\n        <span class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"none\"><path d=\"M7 5v14l11-7L7 5Z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span class=\"lbl\">Play walkthrough<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"legend\">\n    <span class=\"item\"><span class=\"dot par\"><\u002Fspan>Parallel — runs at the same time<\u002Fspan>\n    <span class=\"item\"><span class=\"dot seq\"><\u002Fspan>Sequential — unlocks in order<\u002Fspan>\n    <span class=\"item\"><span class=\"dot ann\"><\u002Fspan>Annual — August MDD only<\u002Fspan>\n    <span class=\"item sla\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg>Complete within 1 week<\u002Fspan>\n    <span class=\"item hint\">Click any step for detail<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"canvas-wrap\" id=\"canvasWrap\">\n    <div class=\"stage-scaler\" id=\"scaler\">\n      <div class=\"stage\" id=\"stage\">\n        <svg class=\"wires\" id=\"wires\" preserveAspectRatio=\"none\"><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- detail drawer -->\n<div class=\"scrim\" id=\"scrim\"><\u002Fdiv>\n<aside class=\"drawer\" id=\"drawer\" aria-label=\"Step detail\">\n  <div clas
